<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="おえかき">
  <meta name="theme-color" content="#ff85a2">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <title>じぶんのえをうごかそう！</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    :root {
      --pink:       #ff85a2;
      --pink2:      #ff5588;
      --purple:     #c98ff7;
      --dpurple:    #8b44d4;
      --lpink:      #ffe4ef;
      --lpurple:    #f0d6ff;
      --yellow:     #ffe066;
      --bg:         #fff8fc;
    }

    html, body {
      width: 100%;
      height: 100%;
      height: 100dvh;
      overflow: hidden;
      overscroll-behavior: none;
      background: var(--bg);
      font-family: 'Hiragino Maru Gothic ProN', 'Hiragino Kaku Gothic ProN', 'BIZ UDGothic', 'Meiryo', sans-serif;
      user-select: none;
      -webkit-user-select: none;
    }

    /* ======== APP SHELL ======== */
    #app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      width: 100%;
      max-width: 480px;
      margin: 0 auto;
      position: relative;
      background: var(--bg);
    }

    /* ======== HEADER ======== */
    #header {
      flex-shrink: 0;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      padding: 10px 14px 7px;
      text-align: center;
      box-shadow: 0 2px 10px rgba(180, 80, 160, 0.3);
      position: relative;
      z-index: 2;
    }

    #header h1 {
      color: #fff;
      font-size: clamp(0.95rem, 4vw, 1.15rem);
      font-weight: bold;
      letter-spacing: 0.04em;
      text-shadow: 0 1px 4px rgba(0,0,0,0.18);
    }

    #step-label {
      color: rgba(255,255,255,0.92);
      font-size: clamp(0.65rem, 3vw, 0.78rem);
      margin-top: 3px;
      transition: opacity 0.3s;
    }

    /* ======== MAIN CANVAS AREA ======== */
    #main {
      flex: 1;
      position: relative;
      overflow: hidden;
      min-height: 0;
      touch-action: none;
      overscroll-behavior: none;
    }

    .screen {
      position: absolute;
      inset: 0;
      display: none;
    }

    .screen.active {
      display: block;
    }

    #screen-char,
    #screen-bg {
      background: #fff;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      display: block;
      touch-action: none;
    }

    /* hint overlay */
    .hint {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      color: #e0c8d8;
      font-size: clamp(0.85rem, 3.5vw, 1rem);
      line-height: 2;
      pointer-events: none;
      transition: opacity 0.4s ease;
    }

    /* ======== ANIMATION SCREEN ======== */
    #anim-buttons {
      position: absolute;
      top: 10px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      gap: 5px;
      padding: 0 6px;
      z-index: 5;
      flex-wrap: wrap;
    }

    .anim-btn {
      background: rgba(255,255,255,0.9);
      border: 2px solid var(--lpurple);
      border-radius: 22px;
      padding: 5px 11px;
      font-size: clamp(0.65rem, 2.8vw, 0.75rem);
      font-weight: bold;
      color: var(--dpurple);
      cursor: pointer;
      transition: all 0.18s;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      white-space: nowrap;
    }

    .anim-btn.active {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      border-color: transparent;
      box-shadow: 0 3px 12px rgba(200, 100, 200, 0.45);
      transform: scale(1.06);
    }

    .anim-btn:active {
      transform: scale(0.96);
    }

    #send-btn {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      border: none;
      border-radius: 32px;
      padding: 12px 28px;
      font-size: clamp(0.82rem, 3.5vw, 0.95rem);
      font-weight: bold;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      cursor: pointer;
      z-index: 5;
      box-shadow: 0 5px 18px rgba(200, 80, 200, 0.5);
      white-space: nowrap;
      transition: transform 0.15s;
    }

    #send-btn:active {
      transform: translateX(-50%) scale(0.96);
    }

    /* ======== TOOLBAR ======== */
    #toolbar {
      flex-shrink: 0;
      background: #fff;
      border-top: 2px solid var(--lpink);
      padding: 7px 8px 6px;
      display: flex;
      flex-direction: column;
      gap: 7px;
      box-shadow: 0 -2px 8px rgba(200, 100, 160, 0.1);
    }

    .t-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    /* color swatch */
    .c-btn {
      width: clamp(28px, 8vw, 36px);
      height: clamp(28px, 8vw, 36px);
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
    }

    .c-btn.on {
      border-color: var(--dpurple);
      transform: scale(1.28);
      box-shadow: 0 2px 10px rgba(120, 50, 210, 0.45);
    }

    /* size dot buttons */
    .sz-btn {
      border: 2px solid transparent;
      border-radius: 10px;
      background: #f8f4ff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    .sz-btn.on {
      border-color: var(--dpurple);
      background: var(--lpurple);
    }

    .sz-btn:active {
      transform: scale(0.91);
    }

    /* action buttons */
    .a-btn {
      border: none;
      border-radius: 20px;
      padding: 6px 13px;
      cursor: pointer;
      font-size: clamp(0.68rem, 3vw, 0.78rem);
      font-weight: bold;
      transition: transform 0.1s;
      flex-shrink: 0;
    }

    .a-btn:active {
      transform: scale(0.93);
    }

    .btn-undo {
      background: #f0f0f0;
      color: #666;
    }

    .btn-clear {
      background: #ffe8ee;
      color: #d44466;
    }

    /* eraser button */
    .btn-eraser {
      background: #f5f0ff;
      color: var(--dpurple);
      border: 2px solid var(--lpurple);
    }

    .btn-eraser.on {
      background: var(--lpurple);
      border-color: var(--dpurple);
    }

    /* ======== TAB BAR ======== */
    #tabbar {
      flex-shrink: 0;
      display: flex;
      background: #fff;
      border-top: 2px solid var(--lpink);
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .tab-btn {
      flex: 1;
      padding: 7px 4px 8px;
      border: none;
      background: none;
      font-size: clamp(0.62rem, 2.8vw, 0.72rem);
      color: #bbb;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
      transition: color 0.2s;
    }

    .tab-icon {
      font-size: clamp(1.2rem, 5vw, 1.5rem);
      transition: transform 0.2s;
      line-height: 1;
    }

    .tab-btn.on {
      color: var(--dpurple);
      font-weight: bold;
    }

    .tab-btn.on .tab-icon {
      transform: scale(1.22);
    }

    /* ======== TRANSITION OVERLAY ======== */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 5rem;
      pointer-events: none;
      opacity: 0;
      z-index: 80;
    }

    /* ======== TOAST ======== */
    #toast {
      position: fixed;
      top: 75px;
      left: 50%;
      transform: translateX(-50%);
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      padding: 10px 26px;
      border-radius: 32px;
      font-size: clamp(0.9rem, 4vw, 1.05rem);
      font-weight: bold;
      z-index: 90;
      opacity: 0;
      pointer-events: none;
      box-shadow: 0 4px 16px rgba(200, 80, 200, 0.55);
      transition: opacity 0.35s ease;
      white-space: nowrap;
    }

    /* ======== STEP DOTS ======== */
    #step-dots {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 3px 0 1px;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      transition: all 0.3s;
    }

    .dot.on {
      background: #fff;
      transform: scale(1.35);
      box-shadow: 0 0 6px rgba(255,255,255,0.8);
    }

    .dot.done {
      background: rgba(255,255,255,0.75);
    }

    /* ======== FRAME (SAFE ZONE) ======== */
    .frame-side {
      position: absolute;
      top: 0; bottom: 0;
      width: 10px;
      background: #3D2260;
      z-index: 10;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 5px;
    }
    .frame-l { left: 0; }
    .frame-r { right: 0; }

    .frame-side-label {
      color: rgba(255,255,255,0.45);
      font-size: 5px;
      writing-mode: vertical-rl;
      letter-spacing: 1px;
      white-space: nowrap;
      line-height: 1;
    }

    .frame-corner {
      position: absolute;
      width: 14px;
      height: 14px;
      z-index: 11;
      pointer-events: none;
      border-color: rgba(255,255,255,0.65);
      border-style: solid;
      border-width: 0;
    }
    .frame-corner.tl { top: 2px;    left: 2px;    border-top-width: 2px;    border-left-width: 2px; }
    .frame-corner.tr { top: 2px;    right: 2px;   border-top-width: 2px;    border-right-width: 2px; }
    .frame-corner.bl { bottom: 2px; left: 2px;    border-bottom-width: 2px; border-left-width: 2px; }
    .frame-corner.br { bottom: 2px; right: 2px;   border-bottom-width: 2px; border-right-width: 2px; }

    /* ======== COLOR MIX POPUP ======== */
    .popup-bg {
      position: fixed;
      inset: 0;
      background: rgba(40, 10, 70, 0.65);
      z-index: 70;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .popup-bg.hidden { display: none; }

    .mix-box {
      background: #fff;
      border-radius: 22px;
      padding: 20px 16px 16px;
      width: 100%;
      max-width: 320px;
      box-shadow: 0 10px 36px rgba(70, 10, 140, 0.38);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      position: relative;
    }

    .mix-title {
      font-size: 0.92rem;
      font-weight: bold;
      color: var(--dpurple);
      text-align: center;
      line-height: 1.55;
    }

    #mix-color-picks {
      display: flex;
      flex-wrap: wrap;
      gap: 9px;
      justify-content: center;
    }

    .mix-pick-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 3px solid transparent;
      cursor: pointer;
      transition: transform 0.15s, border-color 0.15s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .mix-pick-btn.sel {
      border-color: var(--dpurple);
      transform: scale(1.22);
      box-shadow: 0 2px 12px rgba(120,50,200,0.5);
    }

    #mix-go-btn {
      border: none;
      border-radius: 26px;
      padding: 10px 30px;
      font-size: 0.9rem;
      font-weight: bold;
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      cursor: pointer;
      box-shadow: 0 4px 14px rgba(200,80,200,0.4);
      transition: transform 0.15s, opacity 0.15s;
    }
    #mix-go-btn:active  { transform: scale(0.96); }
    #mix-go-btn:disabled { opacity: 0.4; cursor: default; }

    #mix-anim-canvas {
      border-radius: 14px;
      background: var(--lpurple);
    }

    #mix-result {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }

    .mix-result-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .mix-swatch {
      width: 36px; height: 36px;
      border-radius: 50%;
      box-shadow: 0 2px 6px rgba(0,0,0,0.18);
      flex-shrink: 0;
    }
    .mix-swatch-lg { width: 44px; height: 44px; }

    .mix-op {
      font-size: 1.1rem;
      color: #999;
      font-weight: bold;
    }

    .mix-name {
      font-size: 0.92rem;
      font-weight: bold;
      color: var(--dpurple);
    }

    .mix-result-btns {
      display: flex;
      gap: 10px;
    }

    .mix-action-btn {
      border: none;
      border-radius: 22px;
      padding: 9px 18px;
      font-size: 0.82rem;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.12s;
    }
    .mix-action-btn:active { transform: scale(0.95); }

    #mix-use-btn {
      background: linear-gradient(135deg, var(--pink), var(--purple));
      color: #fff;
      box-shadow: 0 3px 10px rgba(200,80,200,0.35);
    }
    #mix-save-btn {
      background: var(--lpurple);
      color: var(--dpurple);
      border: 2px solid var(--purple);
    }

    #mix-close-btn {
      position: absolute;
      top: 10px; right: 12px;
      background: #f0e8ff;
      border: none;
      border-radius: 50%;
      width: 28px; height: 28px;
      font-size: 0.8rem;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    /* Mix button in palette */
    .mix-palette-btn {
      width: clamp(28px, 8vw, 36px);
      height: clamp(28px, 8vw, 36px);
      border-radius: 50%;
      border: 2px dashed rgba(160,80,200,0.5);
      cursor: pointer;
      background: conic-gradient(#ff4488 0%, #ffcc00 25%, #33bb55 50%, #2288ff 75%, #9933ee 100%);
      flex-shrink: 0;
      box-shadow: 0 2px 5px rgba(0,0,0,0.15);
      transition: transform 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.62rem;
      font-weight: bold;
      color: rgba(255,255,255,0.95);
      text-shadow: 0 1px 3px rgba(0,0,0,0.5);
    }
    .mix-palette-btn:active { transform: scale(1.18); }
  </style>
</head>
<body>
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <h1>✨ じぶんのえをうごかそう！ ✨</h1>
    <div id="step-dots">
      <div class="dot on" id="dot0"></div>
      <div class="dot" id="dot1"></div>
      <div class="dot" id="dot2"></div>
    </div>
    <div id="step-label">ゆびでじゆうにキャラをかいてね ✏️</div>
  </div>

  <!-- MAIN CANVAS -->
  <div id="main">
    <!-- Frame safe zones (Android gesture protection) -->
    <div class="frame-side frame-l" aria-hidden="true"><span class="frame-side-label">🖼がくぶち</span></div>
    <div class="frame-side frame-r" aria-hidden="true"><span class="frame-side-label">🖼がくぶち</span></div>
    <div class="frame-corner tl" aria-hidden="true"></div>
    <div class="frame-corner tr" aria-hidden="true"></div>
    <div class="frame-corner bl" aria-hidden="true"></div>
    <div class="frame-corner br" aria-hidden="true"></div>

    <!-- Tab 0: キャラ -->
    <div class="screen active" id="screen-char">
      <canvas id="charCanvas"></canvas>
      <div class="hint" id="hint-char">
        ✏️ ゆびでじゆうにかいてね！<br>
        どんなキャラでもOK！
      </div>
    </div>

    <!-- Tab 1: はいけい -->
    <div class="screen" id="screen-bg">
      <canvas id="bgCanvas"></canvas>
      <canvas id="charOverlay" style="opacity:0.3; pointer-events:none;"></canvas>
      <div class="hint" id="hint-bg">
        🌿 はいけいをかいてね！<br>
        うすいキャラをさんこうにしてね
      </div>
    </div>

    <!-- Tab 2: うごかす -->
    <div class="screen" id="screen-anim">
      <canvas id="animCanvas"></canvas>
      <div id="anim-buttons">
        <button class="anim-btn active" data-anim="bounce">🐰 ぴょんぴょん</button>
        <button class="anim-btn" data-anim="walk">🐾 あるく</button>
        <button class="anim-btn" data-anim="dance">💃 おどる</button>
        <button class="anim-btn" data-anim="sleep">😴 ねむる</button>
      </div>
      <button id="send-btn">💌 かぞくにおくる</button>
    </div>

  </div><!-- /main -->

  <!-- TOOLBAR (hidden on anim tab) -->
  <div id="toolbar">
    <div class="t-row" id="color-row"></div>
    <div class="t-row">
      <button class="sz-btn on" data-sz="3" aria-label="ほそい">
        <svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="4" fill="#555"/></svg>
      </button>
      <button class="sz-btn" data-sz="8" aria-label="ふつう">
        <svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="7" fill="#555"/></svg>
      </button>
      <button class="sz-btn" data-sz="18" aria-label="ふとい">
        <svg width="34" height="34" viewBox="0 0 34 34"><circle cx="17" cy="17" r="11" fill="#555"/></svg>
      </button>
      <button class="a-btn btn-eraser" id="eraser-btn"><svg width="26" height="22" viewBox="0 0 26 22" style="vertical-align:middle;margin-right:3px"><g transform="translate(13,11) rotate(-20)"><rect x="-10" y="-6" width="10" height="12" fill="#F4A7B9" rx="1"/><rect x="0" y="-6" width="10" height="12" fill="#fff" rx="1"/><rect x="-10" y="-6" width="20" height="12" fill="none" stroke="#888" stroke-width="1.5" rx="1"/></g></svg>けしごむ</button>
      <button class="a-btn btn-undo"  id="undo-btn">↩ もどす</button>
      <button class="a-btn btn-clear" id="clear-btn">🗑 けす</button>
    </div>
  </div>

  <!-- TAB BAR -->
  <div id="tabbar">
    <button class="tab-btn on" data-tab="0">
      <span class="tab-icon">🐱</span>
      <span>キャラ</span>
    </button>
    <button class="tab-btn" data-tab="1">
      <span class="tab-icon">🌿</span>
      <span>はいけい</span>
    </button>
    <button class="tab-btn" data-tab="2">
      <span class="tab-icon">▶️</span>
      <span>うごかす</span>
    </button>
  </div>

</div><!-- /app -->

<!-- COLOR MIX POPUP -->
<div id="mix-popup" class="popup-bg hidden">
  <div class="mix-box">
    <button id="mix-close-btn" aria-label="とじる">✕</button>
    <div class="mix-title">まぜたいいろを<br>2つ えらんでね 🎨</div>
    <div id="mix-color-picks"></div>
    <button id="mix-go-btn" disabled>✨ まぜる！</button>
    <canvas id="mix-anim-canvas" width="220" height="72" style="display:none;"></canvas>
    <div id="mix-result" style="display:none;">
      <div class="mix-result-row">
        <div id="mr-c1" class="mix-swatch"></div>
        <span class="mix-op">＋</span>
        <div id="mr-c2" class="mix-swatch"></div>
        <span class="mix-op">＝</span>
        <div id="mr-cm" class="mix-swatch mix-swatch-lg"></div>
      </div>
      <div id="mix-name" class="mix-name"></div>
      <div class="mix-result-btns">
        <button class="mix-action-btn" id="mix-use-btn">🎨 つかう！</button>
        <button class="mix-action-btn" id="mix-save-btn">📦 とっておく</button>
      </div>
    </div>
  </div>
</div>

<!-- TRANSITION OVERLAY -->
<div id="overlay"></div>
<!-- TOAST -->
<div id="toast"></div>

<script>
// ─────────────────────────────────────────────
//  CONSTANTS
// ─────────────────────────────────────────────
const PALETTE = [
  { name: 'くろ',     hex: '#222222' },
  { name: 'ピンク',   hex: '#ff4488' },
  { name: 'むらさき', hex: '#9933ee' },
  { name: 'みどり',   hex: '#33bb55' },
  { name: 'きいろ',   hex: '#ffcc00' },
  { name: 'あお',     hex: '#2288ff' },
  { name: 'オレンジ', hex: '#ff7722' },
];

const STEP_LABELS = [
  'ゆびでじゆうにキャラをかいてね ✏️',
  'はいけいをかいてね 🌿',
  'うごいた！すごい！ 🎉',
];

const SPARKLE_COLORS = ['#ff85a2','#c98ff7','#ffcc00','#ff5588','#88ddff','#ffaacc'];

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
const st = {
  tab:       0,
  color:     PALETTE[0].hex,
  size:      3,
  eraser:    false,
  drawing:   false,
  lx: 0, ly: 0,
  animType:  'bounce',
};

const undoStacks = [[], []]; // [char, bg]
const MAX_UNDO = 18;
const SAFE_MARGIN = 10;

let customColors = [];
const MAX_CUSTOM = 5;

// ─────────────────────────────────────────────

const charCanvas   = document.getElementById('charCanvas');
const bgCanvas     = document.getElementById('bgCanvas');
const charOverlay  = document.getElementById('charOverlay');
const animCanvas   = document.getElementById('animCanvas');

const charCtx    = charCanvas.getContext('2d');
const bgCtx      = bgCanvas.getContext('2d');
const overlayCtx = charOverlay.getContext('2d');
const animCtx    = animCanvas.getContext('2d');

function initCanvases() {
  const m = document.getElementById('main');
  const w = m.clientWidth;
  const h = m.clientHeight;
  [charCanvas, bgCanvas, charOverlay, animCanvas].forEach(c => {
    c.width  = w;
    c.height = h;
    c.style.width  = w + 'px';
    c.style.height = h + 'px';
  });
}

let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    // Save drawings
    const cd = charCtx.getImageData(0, 0, charCanvas.width, charCanvas.height);
    const bd = bgCtx.getImageData(0, 0, bgCanvas.width, bgCanvas.height);
    initCanvases();
    charCtx.putImageData(cd, 0, 0);
    bgCtx.putImageData(bd, 0, 0);
  }, 150);
});

function buildPalette() {
  const row = document.getElementById('color-row');
  row.innerHTML = '';
  [...PALETTE, ...customColors].forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'c-btn' + (c.hex === st.color ? ' on' : '');
    btn.style.background = c.hex;
    btn.title = c.name;
    btn.dataset.color = c.hex;
    btn.setAttribute('role', 'button');
    btn.setAttribute('aria-label', c.name);
    btn.addEventListener('click', () => {
      if (st.eraser) toggleEraser();
      document.querySelectorAll('.c-btn').forEach(b => b.classList.remove('on'));
      btn.classList.add('on');
      st.color = c.hex;
    });
    row.appendChild(btn);
  });
  // ＋まぜる button
  const mixBtn = document.createElement('div');
  mixBtn.className = 'mix-palette-btn';
  mixBtn.title = 'まぜる';
  mixBtn.setAttribute('role', 'button');
  mixBtn.setAttribute('aria-label', 'いろをまぜる');
  mixBtn.textContent = '＋';
  mixBtn.addEventListener('click', openMixPopup);
  row.appendChild(mixBtn);
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────
function activeCtx()    { return st.tab === 0 ? charCtx : bgCtx; }
function activeCanvas() { return st.tab === 0 ? charCanvas : bgCanvas; }

function getXY(e, canvas) {
  const r = canvas.getBoundingClientRect();
  const src = e.changedTouches ? e.changedTouches[0] : e;
  return { x: src.clientX - r.left, y: src.clientY - r.top };
}

function pointerDown(e) {
  if (st.tab > 1) return;
  e.preventDefault();
  const { x, y } = getXY(e, activeCanvas());
  if (x < SAFE_MARGIN || x > activeCanvas().width - SAFE_MARGIN) return;
  saveUndo();
  st.drawing = true;
  st.lx = x; st.ly = y;

  const ctx = activeCtx();
  applyBrush(ctx);
  ctx.beginPath();
  ctx.arc(x, y, st.eraser ? st.size * 1.5 : st.size / 2, 0, Math.PI * 2);
  ctx.fill();

  hideHint();
}

function pointerMove(e) {
  if (!st.drawing || st.tab > 1) return;
  e.preventDefault();
  const { x, y } = getXY(e, activeCanvas());
  if (x < SAFE_MARGIN || x > activeCanvas().width - SAFE_MARGIN) return;
  const ctx = activeCtx();
  applyBrush(ctx);
  ctx.beginPath();
  ctx.moveTo(st.lx, st.ly);
  ctx.lineTo(x, y);
  ctx.stroke();
  st.lx = x; st.ly = y;
}

function pointerUp() { st.drawing = false; }

function applyBrush(ctx) {
  if (st.eraser) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.strokeStyle = 'rgba(0,0,0,1)';
    ctx.fillStyle   = 'rgba(0,0,0,1)';
    ctx.lineWidth   = st.size * 3;
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = st.color;
    ctx.fillStyle   = st.color;
    ctx.lineWidth   = st.size;
  }
  ctx.lineCap  = 'round';
  ctx.lineJoin = 'round';
}

function resetComposite(ctx) {
  ctx.globalCompositeOperation = 'source-over';
}

// Attach to both canvases (only visible one gets events)
[charCanvas, bgCanvas].forEach(cv => {
  cv.addEventListener('touchstart',  pointerDown, { passive: false });
  cv.addEventListener('touchmove',   pointerMove, { passive: false });
  cv.addEventListener('touchend',    pointerUp);
  cv.addEventListener('touchcancel', pointerUp);
  cv.addEventListener('mousedown',   pointerDown);
  cv.addEventListener('mousemove',   pointerMove);
  cv.addEventListener('mouseup',     pointerUp);
  cv.addEventListener('mouseleave',  pointerUp);
});

// ─────────────────────────────────────────────
//  HINT VISIBILITY
// ─────────────────────────────────────────────
function hideHint() {
  const id = st.tab === 0 ? 'hint-char' : 'hint-bg';
  document.getElementById(id).style.opacity = '0';
}

// ─────────────────────────────────────────────
//  UNDO / CLEAR
// ─────────────────────────────────────────────
function saveUndo() {
  if (st.tab > 1) return;
  const cv = activeCanvas();
  const ctx = activeCtx();
  resetComposite(ctx);
  const snap = ctx.getImageData(0, 0, cv.width, cv.height);
  undoStacks[st.tab].push(snap);
  if (undoStacks[st.tab].length > MAX_UNDO) undoStacks[st.tab].shift();
}

document.getElementById('undo-btn').addEventListener('click', () => {
  if (st.tab > 1 || !undoStacks[st.tab].length) return;
  const snap = undoStacks[st.tab].pop();
  const ctx = activeCtx();
  resetComposite(ctx);
  ctx.putImageData(snap, 0, 0);
});

document.getElementById('clear-btn').addEventListener('click', () => {
  if (st.tab > 1) return;
  saveUndo();
  const cv = activeCanvas();
  const ctx = activeCtx();
  resetComposite(ctx);
  ctx.clearRect(0, 0, cv.width, cv.height);
  const id = st.tab === 0 ? 'hint-char' : 'hint-bg';
  document.getElementById(id).style.opacity = '1';
});

//  TAB SWITCHING
// ─────────────────────────────────────────────
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => switchTab(parseInt(btn.dataset.tab)));
});

function switchTab(tab) {
  if (tab === st.tab) return;

  showTransition(tab);
  st.tab = tab;

  document.querySelectorAll('.tab-btn').forEach(b =>
    b.classList.toggle('on', parseInt(b.dataset.tab) === tab));

  document.querySelectorAll('.screen').forEach((s, i) =>
    s.classList.toggle('active', i === tab));

  document.getElementById('step-label').textContent = STEP_LABELS[tab];

  // Step dots
  for (let i = 0; i < 3; i++) {
    const d = document.getElementById('dot' + i);
    d.className = 'dot' + (i === tab ? ' on' : i < tab ? ' done' : '');
  }

  // Toolbar
  document.getElementById('toolbar').style.display = tab === 2 ? 'none' : 'flex';

  // Tab-specific
  if (tab === 1) syncCharOverlay();
  if (tab === 2) { startAnim(); showToast('うごいた！すごい！ 🎉'); }
  else stopAnim();
}

function syncCharOverlay() {
  resetComposite(charCtx);
  overlayCtx.clearRect(0, 0, charOverlay.width, charOverlay.height);
  overlayCtx.drawImage(charCanvas, 0, 0);
}

const TRANS_EMOJI = ['🐱✨', '🌿🎨', '🎉🌟✨'];

function showTransition(tab) {
  const ov = document.getElementById('overlay');
  ov.textContent = TRANS_EMOJI[tab];
  ov.style.background = tab === 2
    ? 'radial-gradient(circle, rgba(255,200,240,0.8), rgba(170,90,255,0.7))'
    : 'rgba(255, 242, 250, 0.82)';
  ov.style.transition = 'none';
  ov.style.opacity = '1';
  ov.style.fontSize = tab === 2 ? '5.5rem' : '4rem';
  requestAnimationFrame(() => requestAnimationFrame(() => {
    ov.style.transition = 'opacity 0.5s ease';
    ov.style.opacity = '0';
  }));
}

let animRAF = null;
let animT   = 0;
let sparkles = [];
let zzzParticles = [];
let walkFlip = 1;

// ── Sparkle ──
function mkSparkle(w, h) {
  return {
    x: Math.random() * w,
    y: Math.random() * h,
    sz: Math.random() * 13 + 7,
    vx: (Math.random() - 0.5) * 1.1,
    vy: -(Math.random() * 1.0 + 0.4),
    rot: Math.random() * Math.PI * 2,
    rspd: (Math.random() - 0.5) * 0.09,
    col: SPARKLE_COLORS[Math.floor(Math.random() * SPARKLE_COLORS.length)],
    life: 1.0,
    decay: Math.random() * 0.008 + 0.004,
  };
}

function tickSparkles(w, h) {
  if (sparkles.length < 22 && Math.random() < 0.38)
    sparkles.push(mkSparkle(w, h));
  sparkles = sparkles.filter(s => s.life > 0.04);
  sparkles.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.rot += s.rspd; s.life -= s.decay;
  });
}

function drawStar(ctx, x, y, r, col, alpha) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(0);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = col;
  ctx.beginPath();
  for (let i = 0; i < 4; i++) {
    const a  = (i / 4) * Math.PI * 2 - Math.PI / 4;
    const a2 = a + Math.PI / 4;
    const ox = Math.cos(a) * r;
    const oy = Math.sin(a) * r;
    const ix = Math.cos(a2) * r * 0.25;
    const iy = Math.sin(a2) * r * 0.25;
    i === 0 ? ctx.moveTo(ox, oy) : ctx.lineTo(ox, oy);
    ctx.lineTo(ix, iy);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawSparkles(ctx) {
  sparkles.forEach(s => drawStar(ctx, s.x, s.y, s.sz / 2, s.col, s.life));
}

// ── ZZZ ──
function mkZzz(cx, cy) {
  return {
    x: cx + (Math.random() - 0.5) * 50,
    y: cy,
    vy: -(Math.random() * 0.5 + 0.3),
    dx: (Math.random() - 0.5) * 0.4,
    sz: Math.random() * 10 + 12,
    life: 1.0,
    decay: 0.006,
  };
}

// ── Main loop ──
function startAnim() {
  stopAnim();
  sparkles = []; zzzParticles = []; animT = 0; walkFlip = 1;

  const w = animCanvas.width;
  const h = animCanvas.height;

  function loop() {
    animT += 0.022;
    const t = animT;

    animCtx.clearRect(0, 0, w, h);

    // Background
    animCtx.fillStyle = '#ffffff';
    animCtx.fillRect(0, 0, w, h);
    resetComposite(bgCtx);
    animCtx.drawImage(bgCanvas, 0, 0);

    // Character transform
    let tx = 0, ty = 0, rot = 0, sx = 1, sy = 1;

    if (st.animType === 'bounce') {
      const b = Math.abs(Math.sin(t * 3.0));
      ty = -b * 68;
      sy =  0.87 + b * 0.13;
      sx =  1 / sy;
    }

    if (st.animType === 'walk') {
      const wave = Math.sin(t * 1.9);
      const vel  = Math.cos(t * 1.9);
      tx = wave * Math.min(w * 0.22, 105);
      ty = -Math.abs(Math.sin(t * 3.8)) * 16;
      if      (vel >  0.08) walkFlip =  1;
      else if (vel < -0.08) walkFlip = -1;
      sx = walkFlip;
    }

    if (st.animType === 'dance') {
      tx  = Math.sin(t * 2.3) * 48;
      rot = Math.sin(t * 2.3) * 0.24;
      ty  = -Math.abs(Math.sin(t * 4.6)) * 22;
    }

    if (st.animType === 'sleep') {
      ty  = Math.sin(t * 0.85) * 11;
      rot = Math.sin(t * 0.85) * 0.058;
      if (Math.random() < 0.022)
        zzzParticles.push(mkZzz(w * 0.57, h * 0.27));
    }

    // Draw character
    resetComposite(charCtx);
    animCtx.save();
    animCtx.translate(w / 2 + tx, h / 2 + ty);
    animCtx.rotate(rot);
    animCtx.scale(sx, sy);
    animCtx.drawImage(charCanvas, -w / 2, -h / 2);
    animCtx.restore();

    // Sparkles
    tickSparkles(w, h);
    drawSparkles(animCtx);

    // ZZZ
    zzzParticles = zzzParticles.filter(z => z.life > 0.04);
    zzzParticles.forEach(z => {
      z.y += z.vy; z.x += z.dx; z.life -= z.decay;
      animCtx.save();
      animCtx.globalAlpha = z.life;
      animCtx.fillStyle = '#8833cc';
      animCtx.font = `bold ${z.sz}px sans-serif`;
      animCtx.textAlign = 'center';
      animCtx.fillText('Z', z.x, z.y);
      animCtx.restore();
    });

    animRAF = requestAnimationFrame(loop);
  }

  animRAF = requestAnimationFrame(loop);
}

function stopAnim() {
  if (animRAF) { cancelAnimationFrame(animRAF); animRAF = null; }
}

// ─────────────────────────────────────────────
let mixPicked  = [];   // up to 2 hex strings currently selected
let mixResult  = null; // { hex, name } of blended color

function openMixPopup() {
  mixPicked = [];
  mixResult = null;

  // Build color swatches from all available colors
  const picksEl = document.getElementById('mix-color-picks');
  picksEl.innerHTML = '';
  [...PALETTE, ...customColors].forEach(c => {
    const btn = document.createElement('div');
    btn.className = 'mix-pick-btn';
    btn.style.background = c.hex;
    btn.dataset.hex = c.hex;
    btn.title = c.name;
    btn.addEventListener('click', () => onMixPick(btn, c.hex));
    picksEl.appendChild(btn);
  });

  // Reset to pick phase
  picksEl.style.display      = 'flex';
  document.getElementById('mix-go-btn').style.display    = 'block';
  document.getElementById('mix-go-btn').disabled         = true;
  document.getElementById('mix-anim-canvas').style.display = 'none';
  document.getElementById('mix-result').style.display   = 'none';

  document.getElementById('mix-popup').classList.remove('hidden');
}

function closeMixPopup() {
  document.getElementById('mix-popup').classList.add('hidden');
}

function onMixPick(btn, hex) {
  const idx = mixPicked.indexOf(hex);
  if (idx !== -1) {
    mixPicked.splice(idx, 1);
    btn.classList.remove('sel');
  } else if (mixPicked.length < 2) {
    mixPicked.push(hex);
    btn.classList.add('sel');
  } else {
    // Replace oldest selection
    const old = mixPicked.shift();
    document.querySelector(`.mix-pick-btn[data-hex="${old}"]`)?.classList.remove('sel');
    mixPicked.push(hex);
    btn.classList.add('sel');
  }
  document.getElementById('mix-go-btn').disabled = mixPicked.length < 2;
}

// ── Color math ──
function blendHex(h1, h2) {
  const parse = h => [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
  const [r1,g1,b1] = parse(h1), [r2,g2,b2] = parse(h2);
  const r = Math.round((r1+r2)/2), g = Math.round((g1+g2)/2), b = Math.round((b1+b2)/2);
  return '#' + [r,g,b].map(v => v.toString(16).padStart(2,'0')).join('');
}

function hexToHue(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
  if (mx===mn) return -1;
  const d=mx-mn;
  let h;
  if (mx===r)      h=(g-b)/d+(g<b?6:0);
  else if (mx===g) h=(b-r)/d+2;
  else             h=(r-g)/d+4;
  return (h/6)*360;
}

function getColorCat(hex) {
  const r=parseInt(hex.slice(1,3),16)/255, g=parseInt(hex.slice(3,5),16)/255, b=parseInt(hex.slice(5,7),16)/255;
  const mx=Math.max(r,g,b), mn=Math.min(r,g,b);
  if (mx-mn < 0.1) return (mx+mn)/2 < 0.3 ? 'dark' : 'light';
  const h=hexToHue(hex);
  if (h>=345||h<20)  return 'red';
  if (h<45)          return 'orange';
  if (h<75)          return 'yellow';
  if (h<165)         return 'green';
  if (h<250)         return 'blue';
  if (h<310)         return 'purple';
  return 'pink';
}

function genColorName(hex1, hex2) {
  const s = new Set([getColorCat(hex1), getColorCat(hex2)]);
  if (s.has('red')    && s.has('blue'))   return 'むらさき';
  if (s.has('red')    && s.has('yellow')) return 'オレンジ';
  if (s.has('blue')   && s.has('yellow')) return 'みどり';
  if (s.has('pink')   && s.has('purple')) return 'むらさきピンク';
  if (s.has('red')    && s.has('orange')) return 'こいオレンジ';
  if (s.has('blue')   && s.has('green'))  return 'みずいろみどり';
  if (s.has('pink')   && s.has('red'))    return 'こいピンク';
  if (s.has('yellow') && s.has('green'))  return 'きみどり';
  if (s.has('pink')   && s.has('blue'))   return 'むらさきみずいろ';
  return 'まほうのいろ';
}

// ── Blend animation ──
function startMixAnim(h1, h2, hm, onDone) {
  const cvs = document.getElementById('mix-anim-canvas');
  const ctx = cvs.getContext('2d');
  const W = cvs.width, H = cvs.height;
  let frame = 0;
  const TOTAL = 58;

  function drawCirc(x, y, r, color, alpha) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  function tick() {
    frame++;
    const p = Math.min(frame / TOTAL, 1);
    const e = p < 0.5 ? 2*p*p : -1+(4-2*p)*p; // ease-in-out

    ctx.clearRect(0, 0, W, H);

    const cx = W/2, cy = H/2;
    const spread = (1-e) * 76;
    const spin   = e * Math.PI * 2.8;
    const r      = 18 + e * 4;

    const x1 = cx + Math.cos(spin + Math.PI) * spread;
    const y1 = cy + Math.sin(spin + Math.PI) * spread * 0.45;
    const x2 = cx + Math.cos(spin) * spread;
    const y2 = cy + Math.sin(spin) * spread * 0.45;

    drawCirc(x1, y1, r, h1, 1 - e*0.35);
    drawCirc(x2, y2, r, h2, 1 - e*0.35);
    // growing merged circle in center
    if (e > 0.5) drawCirc(cx, cy, r*(e-0.5)*2, hm, (e-0.5)*2);

    if (frame < TOTAL) {
      requestAnimationFrame(tick);
    } else {
      // Final burst
      drawCirc(cx, cy, 24, hm, 1);
      for (let i=0; i<10; i++) {
        const a = (i/10)*Math.PI*2;
        drawStar(ctx, cx+Math.cos(a)*34, cy+Math.sin(a)*34, 5,
          SPARKLE_COLORS[i % SPARKLE_COLORS.length], 0.9);
      }
      setTimeout(onDone, 180);
    }
  }
  requestAnimationFrame(tick);
}

function doMix() {
  if (mixPicked.length < 2) return;
  const [h1, h2] = mixPicked;
  const hm   = blendHex(h1, h2);
  const name = genColorName(h1, h2);
  mixResult  = { hex: hm, name };

  // Switch to animation phase
  document.getElementById('mix-color-picks').style.display  = 'none';
  document.getElementById('mix-go-btn').style.display       = 'none';
  const animCvs = document.getElementById('mix-anim-canvas');
  animCvs.style.display = 'block';

  startMixAnim(h1, h2, hm, () => {
    animCvs.style.display = 'none';
    document.getElementById('mr-c1').style.background  = h1;
    document.getElementById('mr-c2').style.background  = h2;
    document.getElementById('mr-cm').style.background  = hm;
    document.getElementById('mix-name').textContent    = `✨ ${name} ✨`;
    document.getElementById('mix-result').style.display = 'flex';
  });
}

document.getElementById('mix-go-btn').addEventListener('click', doMix);
document.getElementById('mix-close-btn').addEventListener('click', closeMixPopup);

document.getElementById('mix-use-btn').addEventListener('click', () => {
  if (!mixResult) return;
  st.color = mixResult.hex;
  if (st.eraser) toggleEraser();
  buildPalette(); // reflects new selected color
  closeMixPopup();
  showToast(`🎨 ${mixResult.name} にしたよ！`);
});

document.getElementById('mix-save-btn').addEventListener('click', () => {
  if (!mixResult) return;
  if (customColors.some(c => c.hex === mixResult.hex)) {
    showToast('もうパレットにあるよ！');
    return;
  }
  if (customColors.length >= MAX_CUSTOM) customColors.shift();
  customColors.push({ name: mixResult.name, hex: mixResult.hex });
  buildPalette();
  showToast(`📦 ${mixResult.name} をパレットにいれたよ！`);
  closeMixPopup();
});

// ─────────────────────────────────────────────
//  SERVICE WORKER 登録
// ─────────────────────────────────────────────
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./service-worker.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW error:', e));
  });
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
function init() {
  initCanvases();
  buildPalette();
}

// PWAスタンドアロン起動時にcanvasサイズが0になる問題の対策
// clientWidthが確定するまでrequestAnimationFrameでリトライする
function safeInit() {
  const el = document.getElementById('main');
  if (!el || el.clientWidth === 0 || el.clientHeight === 0) {
    requestAnimationFrame(safeInit);
    return;
  }
  init();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', safeInit);
} else {
  safeInit();
}
</script>
</body>
</html>
